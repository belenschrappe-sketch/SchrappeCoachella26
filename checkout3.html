<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Step 3 | Coachella</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="checkout3.css">
    <link rel="stylesheet" href="responsive.css">
</head>

<body>

    <header>

           <div class="logo">
          <img src="images/coachellalog.svg" alt="Coachella Logo">

        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="experience.html">Experience</a>
            <a href="schedule.html">Schedule</a>
            <a href="tickets.html">Tickets</a>
            <a href="contact.html">Contact</a>
        </nav>

        <button class="ticket-btn">
            Buy Tickets
        </button>

    </header>

    <section class="card-section">

        <div class="section-title">
            <p>CARD DETAILS</p>
            <h2>Complete Your Payment</h2>
        </div>

        <form action="confirmation.html" class="card-box">

            <h3>Enter Your Card Information</h3>

            <input
                type="text"
                placeholder="Cardholder Name"
                required>

            <input
                type="text"
                placeholder="Card Number"
                maxlength="19"
                required>

            <div class="row">

                <input
                    type="text"
                    placeholder="MM / YY"
                    required>

                <input
                    type="text"
                    placeholder="CVV"
                    maxlength="4"
                    required>

            </div>

            <div class="summary">

                <h4>Order Summary</h4>

                <div class="summary-row">
                    <span>Festival Pass</span>
                    <span>$30,000</span>
                </div>

                <div class="summary-row">
                    <span>Service Fee</span>
                    <span>$2,000</span>
                </div>

                <div class="summary-row total">
                    <span>Total</span>
                    <span>$32,000</span>
                </div>

            </div>

            <div class="checkout-buttons">

                <a href="checkout2.html" class="secondary-btn">
                    Back
                </a>

                <button type="submit" class="main-btn">
                    Complete Purchase
                </button>

            </div>

        </form>

    </section>

</body>
</html>
